<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Kosci Race Tracker</title>
<meta name="description" content="Kosciuszko 100 training tracker and workout log">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kosci Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12151A">
<style>
:root{
  --bg:#12151A; --surface:#1A1F26; --surface2:#222932; --border:#2C3540;
  --text:#ECEEEA; --text-dim:#8A939C; --text-faint:#5B6570;
  --key:#2FD98A; --long:#E8B84B; --strength:#4F9DA6; --steady:#4F8FC0;
  --rest:#4A525C; --race:#E23D5C; --success:#6FA85C;
  --mono: ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
  --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
#kosciapp{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;padding-bottom:74px;}
.hidden{display:none !important;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:0;height:0;}

/* Header */
.k-header{position:relative;padding:22px 18px 16px;overflow:hidden;border-bottom:1px solid var(--border);}
.k-header-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2;}
.k-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--text-faint);text-transform:uppercase;}
.k-title{font-size:19px;font-weight:800;letter-spacing:.02em;margin:2px 0 0;font-stretch:condensed;}
.k-countdown{text-align:right;}
.k-countdown-num{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--key);line-height:1;}
.k-countdown-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text-faint);text-transform:uppercase;margin-top:2px;}
.k-meta{display:flex;gap:14px;margin-top:12px;position:relative;z-index:2;}
.k-meta-item{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.k-meta-item b{color:var(--text);font-weight:600;}
.k-profile{margin-top:14px;height:34px;position:relative;z-index:2;}
.k-profile svg{width:100%;height:100%;display:block;overflow:visible;}

/* Tabs */
.k-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;max-width:520px;margin:0 auto;}
.k-nav-btn{flex:1;padding:11px 4px 9px;background:none;border:none;color:var(--text-faint);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono);}
.k-nav-btn.active{color:var(--key);}
.k-nav-btn svg{width:19px;height:19px;}

/* Views */
.k-view{padding:16px 16px 20px;flex:1;}

/* Cards */
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.k-card-key{border-left:3px solid var(--kindcolor,var(--key));}
.k-section-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin:18px 0 8px;}
.k-section-label:first-child{margin-top:0;}

.k-today-date{font-size:13px;color:var(--text-dim);font-family:var(--mono);}
.k-today-title{font-size:20px;font-weight:800;margin:4px 0 6px;line-height:1.2;}
.k-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--text-dim);}
.k-dot{width:7px;height:7px;border-radius:50%;background:var(--dotcolor,var(--key));display:inline-block;}
.k-stats-row{display:flex;gap:16px;margin:10px 0;}
.k-stat{font-family:var(--mono);}
.k-stat-num{font-size:15px;font-weight:700;}
.k-stat-label{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;}
.k-target{font-size:13px;color:var(--text-dim);line-height:1.5;margin-top:8px;}
.k-desc{font-size:13px;color:var(--text-dim);line-height:1.65;margin-top:10px;white-space:pre-wrap;font-family:var(--sans);}
.k-expand-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-family:var(--mono);padding:6px 10px;border-radius:6px;margin-top:10px;}

.k-btn{width:100%;padding:13px;border-radius:8px;border:none;font-weight:700;font-size:14px;margin-top:10px;font-family:var(--sans);}
.k-btn-primary{background:var(--key);color:#12151A;}
.k-btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.k-btn-ghost{background:none;color:var(--text-dim);border:1px solid var(--border);}

.k-logged-banner{display:flex;align-items:center;gap:8px;background:rgba(111,168,92,0.12);border:1px solid rgba(111,168,92,0.35);color:var(--success);padding:8px 10px;border-radius:8px;font-size:12px;margin-bottom:12px;font-family:var(--mono);}

/* Week view */
.k-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.k-week-nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;}
.k-week-label{text-align:center;}
.k-week-label b{font-size:14px;display:block;}
.k-week-label span{font-size:11px;color:var(--text-faint);font-family:var(--mono);}
.k-day-row{display:flex;align-items:center;gap:10px;padding:11px 10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:8px;}
.k-day-row.today{border-color:var(--key);}
.k-day-date{width:38px;flex-shrink:0;text-align:center;}
.k-day-date .dow{font-family:var(--mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;}
.k-day-date .dom{font-size:16px;font-weight:700;line-height:1.1;}
.k-day-info{flex:1;min-width:0;}
.k-day-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.k-day-sub{font-size:11px;color:var(--text-faint);font-family:var(--mono);margin-top:2px;}
.k-day-check{width:20px;height:20px;flex-shrink:0;}

/* Week totals */
.k-week-totals{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.k-week-total-item{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.k-week-total-num{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--key);}
.k-week-total-unit{font-size:12px;color:var(--text-faint);margin-left:2px;font-weight:500;}
.k-week-total-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

/* Log view */
.k-adherence{display:flex;gap:10px;margin-bottom:16px;}
.k-adherence-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.k-adherence-num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--key);}
.k-adherence-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.k-log-entry{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:8px;}
.k-log-entry-top{display:flex;justify-content:space-between;align-items:baseline;}
.k-log-entry-date{font-family:var(--mono);font-size:11px;color:var(--text-faint);}
.k-log-entry-title{font-size:13px;font-weight:600;margin-top:2px;}
.k-log-entry-stats{display:flex;gap:12px;margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.k-log-entry-notes{font-size:12px;color:var(--text-dim);margin-top:6px;font-style:italic;}
.k-empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px;}

/* Zones */
.k-zone-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
.k-zone-table th{text-align:left;color:var(--text-faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:6px 4px;border-bottom:1px solid var(--border);}
.k-zone-table td{padding:9px 4px;border-bottom:1px solid var(--border);}
.k-zone-name{font-weight:700;}
.k-zone-swatch{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}

/* Modal */
.k-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.k-modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:18px 18px 26px;border-top:1px solid var(--border);}
.k-modal-title{font-size:16px;font-weight:800;margin-bottom:2px;}
.k-modal-sub{font-size:12px;color:var(--text-faint);font-family:var(--mono);margin-bottom:16px;}
.k-form-row{margin-bottom:14px;}
.k-form-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);margin-bottom:6px;display:block;}
.k-status-btns{display:flex;gap:8px;}
.k-status-btn{flex:1;padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;font-weight:600;}
.k-status-btn.selected{border-color:var(--key);color:var(--key);background:rgba(255,90,46,0.1);}
.k-input-row{display:flex;gap:8px;}
.k-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px;font-family:var(--mono);width:100%;}
.k-input::placeholder{color:var(--text-faint);}
textarea.k-input{font-family:var(--sans);resize:vertical;min-height:60px;}
.k-modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:none;color:var(--text-dim);width:30px;height:30px;border-radius:50%;font-size:16px;}
.k-modal-actions{display:flex;gap:8px;margin-top:6px;}
input[type=range]{width:100%;accent-color:var(--key);}
</style>

</head>
<body>
<div id="kosciapp">

  <div class="k-header">
    <div class="k-header-top">
      <div>
        <div class="k-eyebrow">Kosciuszko 100 &middot; Perisher</div>
        <div class="k-title">Race Tracker</div>
      </div>
      <div class="k-countdown">
        <div class="k-countdown-num" id="k-days-left">--</div>
        <div class="k-countdown-label">days to go</div>
      </div>
    </div>
    <div class="k-meta">
      <div class="k-meta-item">Week <b id="k-week-num">--</b>/27</div>
      <div class="k-meta-item"><b id="k-phase-name">--</b></div>
    </div>
    <div class="k-profile"><svg id="k-profile-svg" viewBox="0 0 400 34" preserveAspectRatio="none"></svg></div>
  </div>

  <div class="k-view" id="view-today"></div>
  <div class="k-view hidden" id="view-week"></div>
  <div class="k-view hidden" id="view-log"></div>
  <div class="k-view hidden" id="view-zones"></div>

  <div class="k-nav">
    <button class="k-nav-btn active" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Today
    </button>
    <button class="k-nav-btn" data-tab="week">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
      Week
    </button>
    <button class="k-nav-btn" data-tab="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h9"/></svg>
      Log
    </button>
    <button class="k-nav-btn" data-tab="zones">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
      Zones
    </button>
  </div>

  <div id="modal-root"></div>
</div>

ort."},{"date":"2026-07-12","dateLabel":"Sun 12 Jul 2026","day":"Sun","week":7,"phase":"Base 1","title":"Recovery 8km","type":"Run","duration":54,"distance":8.0,"vert":100,"target":"Effort: HR <155 bpm (Lab: Active Recovery zone <160 bpm, stay at low end), RPE 1-2/10","kind":"recovery","desc":"POST-LONG RUN RECOVERY — 8km\nTarget vert: ~100m\nRecovery shuffle, 8km\nEffort: HR <155 bpm (Lab: Active Recovery zone <160 bpm, stay at low end), RPE 1-2/10\nLegs may be cooked from yesterday's fast finish — that's fine. This is blood flow only.\nWalk any hills. If it hurts to run, walk the whole thing. No ego today."},{"date":"2026-07-13","dateLabel":"Mon 13 Jul 2026","day":"Mon","week":8,"phase":"Base 2 / Build","title":"Strength — Prehab + Stability + Core","type":"Strength","duration":30,"distance":null,"vert":null,"target":"STRENGTH — PREHAB + STABILITY + CORE | ~30min | NO RUNNING TODAY","kind":"strength","desc":"STRENGTH — PREHAB + STABILITY + CORE | ~30min | NO RUNNING TODAY\nLow load, high frequency injury prevention. Ankle/foot, single-leg stability, hip, core. Leaves legs completely fresh — this is NOT a training stimulus, and it must not touch Tuesday's quality.\n\nWARM-UP / MOBILITY (5 min)\nWorld's greatest stretch x5 each side\nHip circles + leg swings x10 each\nAnkle mobility / dorsiflexion rocks x10 each\n\nMAIN SET — 2-3 rounds (light / bodyweight / band)\nSingle-leg balance — 45 sec each side (progress: eyes closed, then unstable surface)\nSingle-leg RDL — 2x8 each leg (light, balance focus — not a strength lift)\nLateral band walks — 2x15 each direction (glute med, knee tracking)\nSingle-leg calf raise — 3x15 each (slow eccentric — Achilles load tolerance)\nTibialis raises — 3x20 (non-negotiable at this mileage)\nHop and stick — 3x5 each leg (land + hold 3 sec — ankle stiffness/proprioception)\n\nCORE — 2 rounds\nPallof press — 3x10 each side\nSide plank with hip dip — 3x10 each side\nBird dog — 3x10 each side\nDead bugs — 3x10\nHollow body hold — 2x20 sec\n\nRULE: Keep everything light. If anything fatigues you, cut volume. Monday is the near-rest day — light prehab only."},{"date":"2026-07-14","dateLabel":"Tue 14 Jul 2026","day":"Tue","week":8,"phase":"Base 2 / Build","title":"V1 — VO2max 4x3min","type":"Run","duration":45,"distance":10.0,"vert":150,"target":"VO2MAX SESSION — total ~10km / ~45min","kind":"key","desc":"VO2MAX SESSION — total ~10km / ~45min\nTarget vert: ~150m\n\nWARM-UP: 3km easy at 5:30-6:00/km (15-18 min). Add 4 strides at end.\n\nMAIN SET: 4 x 3 minutes at VO2max effort\n- Recovery: 3 min easy jog (1:1 ratio) — FULL recovery, not compressed\n- Effort: HR >189 bpm (Lab: above LT2 of 190 bpm — VO2max zone), RPE 9/10\n- Pace: ~3:20-3:35/km flat — controlled hard, NOT a sprint\n- Breathing: heavy, rhythmic — you should NOT be able to speak\n- Each rep: even effort, not dying at the end\n\nCOOL-DOWN: 2km easy (10-12 min)\n\nFOCUS: V1 — introduction. Conservative entry into VO2max work.\nThe goal is to reach VO2max HR (>189) by the end of each rep and hold it.\nIf you hit >189 with 60sec to go — perfect. If you're there at 30sec — you went too hard.\n\nWHY THIS IS IN THE PLAN:\nYour VO2max ceiling (57-58) is the roof above your threshold. Raising it means your\nrace pace at Kosci becomes a smaller fraction of your maximum — same speed, less effort.\n6 weeks of this before the specific endurance phase, then threshold work consolidates on top.\n\nRULES:\n- Full 3min recovery between reps — do NOT compress it to feel tough\n- If HR won't come down to <165 bpm before next rep, take longer\n- Pull the session after rep 3 if form is breaking or pace has dropped >8sec/km"},{"date":"2026-07-15","dateLabel":"Wed 15 Jul 2026","day":"Wed","week":8,"phase":"Base 2 / Build","title":"Easy 15km","type":"Run","duration":87,"distance":15.0,"vert":125,"target":"Effort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10","kind":"easy","desc":"Easy aerobic run, 15km\nTarget vert: ~125m\nEffort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10\nPace: 4:45-5:15/km flat (Lab: Active Recovery slower than 4:31/km — trail/easy effort well below this)\nConversational throughout — if you can't hold a chat, slow down.\nSurface: Flat or rolling road/path"},{"date":"2026-07-16","dateLabel":"Thu 16 Jul 2026","day":"Thu","week":8,"phase":"Base 2 / Build","title":"Strength — Lower Body + Core & Easy Ride","type":"Strength + Ride","duration":100,"distance":null,"vert":null,"target":"STRENGTH — LOWER BODY + CORE — ~40min | LUNCH: Easy Ride ~60min","kind":"strength","desc":"STRENGTH — LOWER BODY + CORE — ~40min | LUNCH: Easy Ride ~60min\nNo recovery jog — straight into strength.\n\nLOAD RULE (non-negotiable): Controlled, NOT maximal. RPE 7-8, always leave 2 reps in reserve. Goal is stimulus, not a 1RM. Progress load slowly. Friday is easy/steady, Saturday is the long run, and Tuesday is fully recovered by the time it comes around (that's the whole point of Thursday placement).\n\nWARM-UP (5 min)\nWorld's greatest stretch x5 each side\nHip circles + leg swings x10 each\nGlute bridges x15\n\nMAIN SET — 3 rounds\nBulgarian Split Squat — 3x8 each leg (moderate load, 2 in reserve)\nRomanian Deadlift — 3x8 (single-leg from Wk6; moderate load)\nHip Thrust — 3x10 (uphill power)\nStep-up with knee drive — 3x8 each leg (box 40-50cm, mirrors climbing)\n\nACCESSORY — 2 rounds\nCalf raises — straight leg x15, bent knee x15 (both heads)\nTibialis raises — 3x20\n\nCORE — 1 round\nPallof press — 3x10 each side\nDead bugs — 3x10\nCopenhagen plank — 3x20 sec each side\n\nNOTE: If legs are off, drop to goblet squats lighter or cut a round.\n\nLUNCH\nEasy ride: ~60 min, conversational pace, HR <145 bpm. Non-weight-bearing flush — no intensity."},{"date":"2026-07-17","dateLabel":"Fri 17 Jul 2026","day":"Fri","week":8,"phase":"Base 2 / Build","title":"Steady 22km (trail)","type":"Run","duration":143,"distance":22.0,"vert":650,"target":"Effort: HR 165-178 bpm, a ry <160 bpm | AeT zone 161-180), RPE 2-3/10\nPace: 4:45-5:15/km flat (Lab: Active Recovery slower than 4:31/km — trail/easy effort well below this)\nConversational throughout — if you can't hold a chat, slow down.\nSurface: Flat or rolling road/path"},{"date":"2026-11-19","dateLabel":"Thu 19 Nov 2026","day":"Thu","week":26,"phase":"Taper","title":"Strength — Lower Body + Core (Taper) & Easy Ride","type":"Strength + Ride","duration":85,"distance":null,"vert":null,"target":"STRENGTH — LOWER BODY + CORE — ~25min TAPER | LUNCH: Easy Ride ~60min","kind":"strength","desc":"STRENGTH — LOWER BODY + CORE — ~25min TAPER | LUNCH: Easy Ride ~60min\nMaintenance only. 2 rounds, light load (-40%), movement quality. Keep the neuromuscular system primed without adding fatigue this close to race. No recovery jog.\n\nWARM-UP (5 min): World's greatest stretch, hip circles, glute bridges x15\n\nMAIN SET — 2 rounds (light)\nBulgarian Split Squat — 2x6 each leg (light)\nSingle-leg RDL — 2x6 each leg (light)\nHip Thrust — 2x8 (light)\nStep-up with knee drive — 2x6 each leg\n\nCORE — 1 round\nPallof press — 2x8 each side; Dead bugs — 2x8\n\nLUNCH\nEasy ride: ~60 min, conversational pace, HR <145 bpm. Non-weight-bearing flush — no intensity."},{"date":"2026-11-20","dateLabel":"Fri 20 Nov 2026","day":"Fri","week":26,"phase":"Taper","title":"Easy 10km (trail)","type":"Run","duration":65,"distance":10.0,"vert":200,"target":"Effort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10","kind":"easy","desc":"Easy aerobic run, 10km\nTarget vert: ~200m\nEffort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10\nPace: 6:15-7:00/km trail (HR-governed — hold <165 bpm flat, allow to 172 on climbs. Lab: AeT zone ceiling is 180 bpm)\nConversational throughout — if you can't hold a chat, slow down.\nSurface: Trail\n\nTaper Friday — easy, no quality. Just movement."},{"date":"2026-11-21","dateLabel":"Sat 21 Nov 2026","day":"Sat","week":26,"phase":"Taper","title":"Easy 15km (trail)","type":"Run","duration":98,"distance":15.0,"vert":null,"target":"Effort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10","kind":"easy","desc":"Easy aerobic run, 15km\nEffort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10\nPace: 6:15-7:00/km trail (HR-governed — hold <165 bpm flat, allow to 172 on climbs. Lab: AeT zone ceiling is 180 bpm)\nConversational throughout — if you can't hold a chat, slow down.\nSurface: Trail\n\nLast meaningful run. Easy. Joyful. Trust the work."},{"date":"2026-11-22","dateLabel":"Sun 22 Nov 2026","day":"Sun","week":26,"phase":"Taper","title":"Easy 8km","type":"Run","duration":46,"distance":8.0,"vert":75,"target":"Effort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10","kind":"easy","desc":"Easy aerobic run, 8km\nTarget vert: ~75m\nEffort: HR <165 bpm flat (Lab: Active Recovery <160 bpm | AeT zone 161-180), RPE 2-3/10\nPace: 4:45-5:15/km flat (Lab: Active Recovery slower than 4:31/km — trail/easy effort well below this)\nConversational throughout — if you can't hold a chat, slow down.\nSurface: Flat or rolling road/path\n\nRace-kit dress rehearsal — wear race vest, shoes, full kit."},{"date":"2026-11-23","dateLabel":"Mon 23 Nov 2026","day":"Mon","week":27,"phase":"Race Week","title":"Shakeout 5km","type":"Run","duration":30,"distance":5.0,"vert":null,"target":"Effort: HR Z1, RPE 2/10","kind":"easy","desc":"Pre-race shakeout, 5km\nEffort: HR Z1, RPE 2/10\nEasy aerobic — just opens the legs.\nFinish with 4 x 15-second relaxed accelerations.\nShould feel GOOD afterward, not tired."},{"date":"2026-11-24","dateLabel":"Tue 24 Nov 2026","day":"Tue","week":27,"phase":"Race Week","title":"Travel Day","type":"Other","duration":30,"distance":null,"vert":null,"target":"Drive Sydney → Jindabyne/Thredbo (5-6hr)","kind":"other","desc":"Drive Sydney → Jindabyne/Thredbo (5-6hr)\n30 min easy walk only (no running).\nHYDRATE aggressively — start now, don't wait.\nAltitude exposure begins."},{"date":"2026-11-25","dateLabel":"Wed 25 Nov 2026","day":"Wed","week":27,"phase":"Race Week","title":"Race Terrain Easy 5km","type":"Run","duration":35,"distance":5.0,"vert":25,"target":"Effort: HR Z1, RPE 1-2/10","kind":"race","desc":"Easy run ON RACE TERRAIN at altitude — 5km\nTarget vert: ~25m\nEffort: HR Z1, RPE 1-2/10\nPurpose: feel the altitude, scope the start, calm the nerves\nIf you can drive the early course beforehand, do that too.\nNO efforts. Just feel."},{"date":"2026-11-26","dateLabel":"Thu 26 Nov 2026","day":"Thu","week":27,"phase":"Race Week","title":"Pre-Race Rest","type":"Rest Day","duration":null,"distance":null,"vert":null,"target":"REST — feet up.","kind":"race","desc":"REST — feet up.\nBib pickup. Kit check + lay out. Drop bag pack.\nCarb-load lunch (rice/pasta/bread + lean protein).\nLight dinner before 7pm.\nEarly bed. Set 3 alarms.\nHYDRATE. Salt with meals."},{"date":"2026-11-27","dateLabel":"Fri 27 Nov 2026","day":"Fri","week":27,"phase":"Race Week","title":"KOSCI 100 — RACE DAY","type":"Race","duration":675,"distance":102.0,"vert":1525,"target":"KOSCI 100 — RACE DAY | 102km | ~3,030m vert | GOAL: TOP 10","kind":"race","desc":"KOSCI 100 — RACE DAY | 102km | ~3,030m vert | GOAL: TOP 10\nTarget vert: ~1525m\nTARGET FINISH: 11:15 (6:37/km average)\n\nPACING:\n- Flats/runnable: 6:20-6:40/km, HR 155-168 bpm (Lab: inside AeT — well aerobic)\n- Climbs: power-hike/run, HR to 178-180 ceiling, do NOT spike above\n- Descents: controlled, let gravity work, save the quads early\n- First 60km is above 1,600m — altitude pushes HR 5-8 bpm higher for the same pace. Trust HR, not pace, early. Start 10-15 sec/km slower than feels right for the first 10km.\n\nEXECUTION:\n- Even/negative split. The race is won from km 70 onwards.\n- Fuel 90-100g CHO/hr from the start — never let the tank empty\n- Hydration + salt per your trained protocol\n- Stay calm in the first half. Top 10 comes from not blowing up, not from early heroics.\n\nThis is the day. The work is done. Execute."},{"date":"2026-11-28","dateLabel":"Sat 28 Nov 2026","day":"Sat","week":27,"phase":"Race Week","title":"Post-Race Recovery","type":"Other","duration":20,"distance":null,"vert":null,"target":"Race recovery day 1.","kind":"race","desc":"Race recovery day 1.\nWalk + soak + eat + reflect.\nNo running. Mobility only if it feels good."},{"date":"2026-11-29","dateLabel":"Sun 29 Nov 2026","day":"Sun","week":27,"phase":"Race Week","title":"Post-Race Recovery","type":"Other","duration":20,"distance":null,"vert":null,"target":"Easy 20 min walk + mobility work.","kind":"race","desc":"Easy 20 min walk + mobility work.\nNo running this week.\nLet the body process."}]</script>

<script>
(function(){
"use strict";

const SESSIONS = JSON.parse(document.getElementById('sessions-data').textContent);
const RACE_DATE = new Date('2026-11-27T00:00:00');
const BLOCK_START = new Date('2026-05-25T00:00:00');
const BLOCK_END = new Date('2026-11-29T00:00:00');

const KIND_COLOR = {
  key:'var(--key)', long:'var(--long)', strength:'var(--strength)',
  steady:'var(--steady)', easy:'var(--steady)', recovery:'var(--steady)',
  rest:'var(--rest)', race:'var(--race)', other:'var(--rest)'
};
const KIND_LABEL = {
  key:'Quality', long:'Long Run', strength:'Strength', steady:'Steady',
  easy:'Easy', recovery:'Recovery', rest:'Rest', race:'Race', other:'Other'
};

function pad(n){return n<10?'0'+n:''+n;}
function isoOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseISO(iso){const p=iso.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function todayISO(){return isoOf(new Date());}
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDayLabel(iso){
  const d=parseISO(iso);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {dow:days[d.getDay()], dom:d.getDate(), mon:months[d.getMonth()]};
}

function sessionByISO(iso){ return SESSIONS.find(s=>s.date===iso); }

// ---------------- Storage helpers (localStorage — standalone/GitHub Pages build) ----------------
const logCache = {};
const LS_PREFIX = 'kosci_log_';
async function getLog(iso){
  if(logCache[iso]!==undefined) return logCache[iso];
  try{
    const raw = localStorage.getItem(LS_PREFIX+iso);
    const val = raw ? JSON.parse(raw) : null;
    logCache[iso] = val;
    return val;
  }catch(e){
    logCache[iso] = null;
    return null;
  }
}
async function setLog(iso, obj){
  localStorage.setItem(LS_PREFIX+iso, JSON.stringify(obj));
  logCache[iso] = obj;
}
async function deleteLogEntry(iso){
  try{ localStorage.removeItem(LS_PREFIX+iso); }catch(e){}
  logCache[iso] = null;
}
async function getAllLogKeys(){
  const keys = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.startsWith(LS_PREFIX)) keys.push('log:'+k.slice(LS_PREFIX.length));
  }
  return keys;
}
async function primeAllLogs(){
  const keys = await getAllLogKeys();
  await Promise.all(keys.map(async k=>{
    const iso = k.replace('log:','');
    if(logCache[iso]===undefined) await getLog(iso);
  }));
}

// ---------------- Weekly volume chart (replaces decorative profile) ----------------
function computeWeeklyVolumes(){
  const totals = {};
  for(const s of SESSIONS){
    if(!s.week) continue;
    if(s.distance) totals[s.week] = (totals[s.week]||0) + s.distance;
  }
  return totals;
}
function renderProfile(){
  const svg = document.getElementById('k-profile-svg');
  const vol = computeWeeklyVolumes();
  const totalWeeks = 27;
  const values = [];
  for(let w=1; w<=totalWeeks; w++) values.push(vol[w] || 0);
  const maxVol = Math.max(...values, 1);

  const t = sessionByISO(todayISO());
  const currentWeek = t ? t.week : null;

  const chartH = 30; // leave 4px headroom at top of 34-height viewBox
  const gap = 1.2;
  const barW = (400/totalWeeks) - gap;

  let bars = '';
  for(let i=0;i<totalWeeks;i++){
    const wk = i+1;
    const v = values[i];
    const h = maxVol>0 ? (v/maxVol)*chartH : 0;
    const x = i*(400/totalWeeks) + gap/2;
    const y = 34-h;
    const isCurrent = wk===currentWeek;
    const color = isCurrent ? 'var(--key)' : 'var(--border)';
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${color}" rx="0.5"/>`;
  }
  svg.innerHTML = bars;
}

function renderHeader(){
  const now = new Date();
  const daysLeft = Math.ceil((RACE_DATE - now)/86400000);
  document.getElementById('k-days-left').textContent = daysLeft>=0 ? daysLeft : 'RACED';
  const t = sessionByISO(todayISO());
  document.getElementById('k-week-num').textContent = t ? t.week : '--';
  document.getElementById('k-phase-name').textContent = t ? t.phase : (now < BLOCK_START ? 'Not started' : 'Post-race');
  renderProfile();
}

// ---------------- TODAY VIEW ----------------
async function renderToday(){
  const el = document.getElementById('view-today');
  const iso = todayISO();
  const s = sessionByISO(iso);
  if(!s){
    el.innerHTML = `<div class="k-empty">No session scheduled for today.<br>Outside the current training block.</div>`;
    return;
  }
  const log = await getLog(iso);
  const color = KIND_COLOR[s.kind] || 'var(--key)';
  const {dow,dom,mon} = fmtDayLabel(iso);

  let loggedBanner = '';
  if(log){
    const statusLabel = log.status==='completed' ? 'Logged &mdash; completed' : log.status==='partial' ? 'Logged &mdash; partial' : 'Logged &mdash; skipped';
    loggedBanner = `<div class="k-logged-banner">&#10003; ${statusLabel}</div>`;
  }

  el.innerHTML = `
    ${loggedBanner}
    <div class="k-card k-card-key" style="--kindcolor:${color}">
      <div class="k-today-date">${dow} ${dom} ${mon} &middot; Week ${s.week} &middot; ${escapeHtml(s.phase)}</div>
      <div class="k-today-title">${escapeHtml(s.title)}</div>
      <span class="k-badge"><span class="k-dot" style="--dotcolor:${color}"></span>${KIND_LABEL[s.kind]||s.type}</span>
      <div class="k-stats-row">
        ${s.duration ? `<div class="k-stat"><div class="k-stat-num">${s.duration}<span style="font-size:11px;color:var(--text-faint)">min</span></div><div class="k-stat-label">Duration</div></div>` : ''}
        ${s.distance ? `<div class="k-stat"><div class="k-stat-num">${s.distance}<span style="font-size:11px;color:var(--text-faint)">km</span></div><div class="k-stat-label">Distance</div></div>` : ''}
      </div>
      ${s.target ? `<div class="k-target">${escapeHtml(s.target)}</div>` : ''}
      <button class="k-expand-btn" id="today-expand">Show full session</button>
      <div class="k-desc hidden" id="today-desc">${escapeHtml(s.desc)}</div>
      <button class="k-btn k-btn-primary" id="today-log-btn">${log ? 'Edit log' : 'Log this workout'}</button>
    </div>
  `;
  document.getElementById('today-expand').onclick = ()=>{
    const d = document.getElementById('today-desc');
    d.classList.toggle('hidden');
    document.getElementById('today-expand').textContent = d.classList.contains('hidden') ? 'Show full session' : 'Hide full session';
  };
  document.getElementById('today-log-btn').onclick = ()=> openLogModal(iso, s, log);
}

// ---------------- WEEK VIEW ----------------
let weekOffset = 0; // 0 = week containing today
function getMonday(d){
  const day = d.getDay();
  const diff = (day===0?-6:1)-day;
  const m = new Date(d);
  m.setDate(d.getDate()+diff);
  return m;
}
async function renderWeek(){
  const el = document.getElementById('view-week');
  const base = new Date();
  base.setDate(base.getDate() + weekOffset*7);
  const monday = getMonday(base);
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    days.push(isoOf(d));
  }
  const first = sessionByISO(days[0]);
  const last = sessionByISO(days[6]);
  const label = first ? `Week ${first.week} &middot; ${escapeHtml(first.phase)}` : (last ? `Week ${last.week} &middot; ${escapeHtml(last.phase)}` : 'Outside training block');

  let rowsHtml = '';
  for(const iso of days){
    const s = sessionByISO(iso);
    const {dow,dom} = fmtDayLabel(iso);
    const isToday = iso===todayISO();
    if(!s){
      rowsHtml += `<div class="k-day-row ${isToday?'today':''}"><div class="k-day-date"><div class="dow">${dow}</div><div class="dom">${dom}</div></div><div class="k-day-info"><div class="k-day-title" style="color:var(--text-faint)">No session</div></div></div>`;
      continue;
    }
    const color = KIND_COLOR[s.kind] || 'var(--key)';
    const log = await getLog(iso);
    rowsHtml += `
      <div class="k-day-row ${isToday?'today':''}" data-iso="${iso}">
        <div class="k-day-date"><div class="dow">${dow}</div><div class="dom">${dom}</div></div>
        <div class="k-day-info">
          <div class="k-day-title"><span class="k-dot" style="--dotcolor:${color}"></span>&nbsp;${escapeHtml(s.title)}</div>
          <div class="k-day-sub">${s.duration?s.duration+'min':''}${s.duration&&s.distance?' &middot; ':''}${s.distance?s.distance+'km':''}</div>
        </div>
        <div class="k-day-check">${log ? '<svg viewBox="0 0 24 24" fill="none" stroke="#6FA85C" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>' : ''}</div>
      </div>`;
  }

  let totalKm = 0, totalVert = 0, hasVert = false;
  for(const iso of days){
    const s = sessionByISO(iso);
    if(s && s.distance) totalKm += s.distance;
    if(s && s.vert){ totalVert += s.vert; hasVert = true; }
  }
  const totalsHtml = `
    <div class="k-week-totals">
      <div class="k-week-total-item">
        <div class="k-week-total-num">${totalKm.toFixed(totalKm % 1 === 0 ? 0 : 1)}<span class="k-week-total-unit">km</span></div>
        <div class="k-week-total-label">Total distance</div>
      </div>
      <div class="k-week-total-item">
        <div class="k-week-total-num">${hasVert ? totalVert : '&ndash;'}${hasVert?'<span class="k-week-total-unit">m</span>':''}</div>
        <div class="k-week-total-label">Total vert</div>
      </div>
    </div>
  `;

  el.innerHTML = `
    <div class="k-week-nav">
      <button class="k-week-nav-btn" id="week-prev">&#8249;</button>
      <div class="k-week-label"><b>${label}</b><span>${fmtDayLabel(days[0]).dom} ${fmtDayLabel(days[0]).mon} &ndash; ${fmtDayLabel(days[6]).dom} ${fmtDayLabel(days[6]).mon}</span></div>
      <button class="k-week-nav-btn" id="week-next">&#8250;</button>
    </div>
    ${rowsHtml}
    ${totalsHtml}
  `;
  document.getElementById('week-prev').onclick = ()=>{ weekOffset--; renderWeek(); };
  document.getElementById('week-next').onclick = ()=>{ weekOffset++; renderWeek(); };
  el.querySelectorAll('.k-day-row[data-iso]').forEach(row=>{
    row.onclick = async ()=>{
      const iso = row.getAttribute('data-iso');
      const s = sessionByISO(iso);
      const log = await getLog(iso);
      openLogModal(iso, s, log);
    };
  });
}

// ---------------- LOG / STATS VIEW ----------------
function isLoggableKind(kind){ return kind!=='rest' && kind!=='other'; }

async function renderLog(){
  const el = document.getElementById('view-log');
  el.innerHTML = `<div class="k-empty">Loading&hellip;</div>`;
  await primeAllLogs();

  const now = new Date();
  function adherence(days){
    let planned=0, done=0;
    for(let i=0;i<days;i++){
      const d = new Date(now); d.setDate(now.getDate()-i);
      const iso = isoOf(d);
      const s = sessionByISO(iso);
      if(!s || !isLoggableKind(s.kind)) continue;
      planned++;
      const log = logCache[iso];
      if(log && (log.status==='completed'||log.status==='partial')) done++;
    }
    return {done,planned};
  }
  const a7 = adherence(7);
  const a30 = adherence(30);

  const entries = Object.keys(logCache)
    .filter(iso=>logCache[iso])
    .sort((a,b)=> b.localeCompare(a));

  let entriesHtml = '';
  if(entries.length===0){
    entriesHtml = `<div class="k-empty">No workouts logged yet.<br>Log today's session from the Today tab.</div>`;
  } else {
    for(const iso of entries){
      const log = logCache[iso];
      const s = sessionByISO(iso);
      const {dow,dom,mon} = fmtDayLabel(iso);
      const statusColor = log.status==='completed' ? 'var(--success)' : log.status==='partial' ? 'var(--long)' : 'var(--rest)';
      entriesHtml += `
        <div class="k-log-entry" data-iso="${iso}">
          <div class="k-log-entry-top">
            <div>
              <div class="k-log-entry-date">${dow} ${dom} ${mon}</div>
              <div class="k-log-entry-title">${escapeHtml(s?s.title:'Workout')}</div>
            </div>
            <span class="k-badge" style="color:${statusColor};background:transparent;border:1px solid ${statusColor}">${escapeHtml(log.status)}${log.source==='strava'?' &middot; Strava':''}</span>
          </div>
          <div class="k-log-entry-stats">
            ${log.duration?`<span>${escapeHtml(log.duration)}min</span>`:''}
            ${log.distance?`<span>${escapeHtml(log.distance)}km</span>`:''}
            ${log.avgHR?`<span>${escapeHtml(log.avgHR)}bpm</span>`:''}
            ${log.avgPace?`<span>${escapeHtml(log.avgPace)}/km</span>`:''}
            ${log.rpe?`<span>RPE ${escapeHtml(log.rpe)}</span>`:''}
          </div>
          ${log.notes?`<div class="k-log-entry-notes">"${escapeHtml(log.notes)}"</div>`:''}
        </div>`;
    }
  }

  el.innerHTML = `
    <div class="k-adherence">
      <div class="k-adherence-card"><div class="k-adherence-num">${a7.done}/${a7.planned}</div><div class="k-adherence-label">Last 7 days</div></div>
      <div class="k-adherence-card"><div class="k-adherence-num">${a30.done}/${a30.planned}</div><div class="k-adherence-label">Last 30 days</div></div>
    </div>
    <button class="k-btn k-btn-secondary" id="import-strava-btn" style="margin-top:0;margin-bottom:4px;">Import from Strava</button>
    <div class="k-section-label">History</div>
    ${entriesHtml}
  `;
  document.getElementById('import-strava-btn').onclick = openImportModal;
  el.querySelectorAll('.k-log-entry').forEach(row=>{
    row.onclick = async ()=>{
      const iso = row.getAttribute('data-iso');
      const s = sessionByISO(iso);
      const log = await getLog(iso);
      openLogModal(iso, s, log);
    };
  });
}

// ---------------- ZONES VIEW ----------------
function renderZones(){
  const el = document.getElementById('view-zones');
  const zones = [
    {name:'Active Recovery', hr:'&lt;155 bpm', pace:'slower than 4:31/km', color:'var(--rest)'},
    {name:'Endurance / AeT (LT1)', hr:'161&ndash;178 bpm', pace:'~4:00/km at LT1', color:'var(--steady)'},
    {name:'Tempo', hr:'176&ndash;185 bpm', pace:'&mdash;', color:'var(--long)'},
    {name:'Threshold (LT2/AnT)', hr:'183&ndash;189 bpm', pace:'3:32/km lab benchmark', color:'var(--key)'},
    {name:'VO2max', hr:'&gt;189 bpm', pace:'&mdash;', color:'var(--race)'},
  ];
  let rows = zones.map(z=>`
    <tr><td><span class="k-zone-swatch" style="background:${z.color}"></span><span class="k-zone-name">${z.name}</span></td><td>${z.hr}</td><td>${z.pace}</td></tr>
  `).join('');
  el.innerHTML = `
    <div class="k-section-label">Lab-derived HR zones &middot; Feb 2023</div>
    <table class="k-zone-table">
      <thead><tr><th>Zone</th><th>HR</th><th>Pace ref</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="k-section-label">Kosci race target</div>
    <div class="k-card">
      <div class="k-stats-row">
        <div class="k-stat"><div class="k-stat-num">6:37</div><div class="k-stat-label">Pace /km</div></div>
        <div class="k-stat"><div class="k-stat-num">155&ndash;168</div><div class="k-stat-label">HR bpm</div></div>
        <div class="k-stat"><div class="k-stat-num">11:15</div><div class="k-stat-label">Target finish</div></div>
      </div>
      <div class="k-target">Held inside AeT the whole way. Race through attrition and even pacing &mdash; not a finishing kick. Max HR 201 &middot; VO2max ~57&ndash;58.</div>
    </div>
    <div class="k-section-label">Reference</div>
    <div class="k-card">
      <div class="k-target">
        LT1/AeT: 180 bpm at 4:00/km flat<br>
        LT2/AnT: 187&ndash;190 bpm at 3:32/km flat (~95% of VO2max)<br>
        Coros zone estimates are less accurate than lab data &mdash; these lab zones are the reference standard.
      </div>
    </div>
  `;
}

// ---------------- LOG MODAL ----------------
function openLogModal(iso, s, existingLog){
  const root = document.getElementById('modal-root');
  const {dow,dom,mon} = fmtDayLabel(iso);
  let status = existingLog ? existingLog.status : 'completed';

  root.innerHTML = `
    <div class="k-modal-overlay" id="modal-overlay">
      <div class="k-modal">
        <button class="k-modal-close" id="modal-close">&times;</button>
        <div class="k-modal-title">${escapeHtml(s ? s.title : 'Workout')}</div>
        <div class="k-modal-sub">${dow} ${dom} ${mon}${s?(' &middot; '+escapeHtml(s.type)):''}</div>

        <div class="k-form-row">
          <label class="k-form-label">Status</label>
          <div class="k-status-btns" id="status-btns">
            <button type="button" class="k-status-btn" data-val="completed">Completed</button>
            <button type="button" class="k-status-btn" data-val="partial">Partial</button>
            <button type="button" class="k-status-btn" data-val="skipped">Skipped</button>
          </div>
        </div>

        <div class="k-form-row">
          <label class="k-form-label">Duration (min) / Distance (km)</label>
          <div class="k-input-row">
            <input class="k-input" id="f-duration" type="number" inputmode="numeric" placeholder="${s&&s.duration?s.duration:'min'}" value="${existingLog&&existingLog.duration?existingLog.duration:''}">
            <input class="k-input" id="f-distance" type="number" inputmode="decimal" placeholder="${s&&s.distance?s.distance:'km'}" value="${existingLog&&existingLog.distance?existingLog.distance:''}">
          </div>
        </div>

        <div class="k-form-row">
          <label class="k-form-label">Avg HR (bpm) / Avg pace (/km)</label>
          <div class="k-input-row">
            <input class="k-input" id="f-hr" type="number" inputmode="numeric" placeholder="bpm" value="${existingLog&&existingLog.avgHR?existingLog.avgHR:''}">
            <input class="k-input" id="f-pace" type="text" placeholder="e.g. 5:42" value="${existingLog&&existingLog.avgPace?escapeHtml(existingLog.avgPace):''}">
          </div>
        </div>

        <div class="k-form-row">
          <label class="k-form-label">RPE &mdash; <span id="rpe-val">${existingLog&&existingLog.rpe?existingLog.rpe:5}</span>/10</label>
          <input type="range" min="1" max="10" id="f-rpe" value="${existingLog&&existingLog.rpe?existingLog.rpe:5}">
        </div>

        <div class="k-form-row">
          <label class="k-form-label">Notes</label>
          <textarea class="k-input" id="f-notes" placeholder="How did it feel? Anything off?">${existingLog&&existingLog.notes?escapeHtml(existingLog.notes):''}</textarea>
        </div>

        <div class="k-modal-actions">
          ${existingLog?'<button class="k-btn k-btn-ghost" id="f-delete" style="margin-top:0">Delete</button>':''}
          <button class="k-btn k-btn-primary" id="f-save" style="margin-top:0">Save log</button>
        </div>
      </div>
    </div>
  `;

  function setStatus(v){
    status = v;
    root.querySelectorAll('.k-status-btn').forEach(b=> b.classList.toggle('selected', b.getAttribute('data-val')===v));
  }
  setStatus(status);
  root.querySelectorAll('.k-status-btn').forEach(b=> b.onclick = ()=> setStatus(b.getAttribute('data-val')));

  document.getElementById('f-rpe').oninput = (e)=>{ document.getElementById('rpe-val').textContent = e.target.value; };

  function closeModal(){ root.innerHTML=''; }
  document.getElementById('modal-close').onclick = closeModal;
  document.getElementById('modal-overlay').onclick = (e)=>{ if(e.target.id==='modal-overlay') closeModal(); };

  document.getElementById('f-save').onclick = async ()=>{
    const obj = {
      status,
      duration: document.getElementById('f-duration').value || null,
      distance: document.getElementById('f-distance').value || null,
      avgHR: document.getElementById('f-hr').value || null,
      avgPace: document.getElementById('f-pace').value || null,
      rpe: document.getElementById('f-rpe').value || null,
      notes: document.getElementById('f-notes').value || null,
      loggedAt: new Date().toISOString()
    };
    await setLog(iso, obj);
    closeModal();
    refreshAll();
  };

  if(existingLog){
    document.getElementById('f-delete').onclick = async ()=>{
      await deleteLogEntry(iso);
      closeModal();
      refreshAll();
    };
  }
}

// ---------------- IMPORT FROM STRAVA ----------------
function openImportModal(){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="k-modal-overlay" id="import-overlay">
      <div class="k-modal">
        <button class="k-modal-close" id="import-close">&times;</button>
        <div class="k-modal-title">Import from Strava</div>
        <div class="k-modal-sub">Paste the log batch Claude generated in chat</div>
        <div class="k-form-row">
          <label class="k-form-label">JSON batch</label>
          <textarea class="k-input" id="import-json" style="min-height:160px;font-family:var(--mono);font-size:12px;" placeholder='[{"date":"2026-07-14","status":"completed","duration":49,"distance":10.6,"avgHR":165,"avgPace":"4:38","notes":"..."}]'></textarea>
        </div>
        <div id="import-error" style="color:var(--race);font-size:12px;margin-top:-6px;margin-bottom:10px;"></div>
        <div class="k-modal-actions">
          <button class="k-btn k-btn-primary" id="import-confirm" style="margin-top:0;">Import</button>
        </div>
      </div>
    </div>
  `;
  function closeModal(){ root.innerHTML=''; }
  document.getElementById('import-close').onclick = closeModal;
  document.getElementById('import-overlay').onclick = (e)=>{ if(e.target.id==='import-overlay') closeModal(); };
  document.getElementById('import-confirm').onclick = async ()=>{
    const raw = document.getElementById('import-json').value.trim();
    const errEl = document.getElementById('import-error');
    errEl.textContent = '';
    let batch;
    try{
      batch = JSON.parse(raw);
      if(!Array.isArray(batch)) throw new Error('Expected a JSON array');
    }catch(e){
      errEl.textContent = 'Could not parse that JSON: ' + e.message;
      return;
    }
    let count = 0;
    for(const entry of batch){
      if(!entry.date) continue;
      const obj = {
        status: entry.status || 'completed',
        duration: entry.duration || null,
        distance: entry.distance || null,
        avgHR: entry.avgHR || null,
        avgPace: entry.avgPace || null,
        rpe: entry.rpe || null,
        notes: entry.notes || null,
        source: 'strava',
        loggedAt: new Date().toISOString()
      };
      await setLog(entry.date, obj);
      count++;
    }
    closeModal();
    refreshAll();
  };
}

// ---------------- TAB NAV ----------------
function showTab(tab){
  document.querySelectorAll('.k-nav-btn').forEach(b=> b.classList.toggle('active', b.getAttribute('data-tab')===tab));
  document.getElementById('view-today').classList.toggle('hidden', tab!=='today');
  document.getElementById('view-week').classList.toggle('hidden', tab!=='week');
  document.getElementById('view-log').classList.toggle('hidden', tab!=='log');
  document.getElementById('view-zones').classList.toggle('hidden', tab!=='zones');
  if(tab==='today') renderToday();
  if(tab==='week') renderWeek();
  if(tab==='log') renderLog();
  if(tab==='zones') renderZones();
}
document.querySelectorAll('.k-nav-btn').forEach(b=>{
  b.onclick = ()=> showTab(b.getAttribute('data-tab'));
});

function refreshAll(){
  renderHeader();
  const active = document.querySelector('.k-nav-btn.active').getAttribute('data-tab');
  showTab(active);
}

renderHeader();
renderToday();

})();
</script>
